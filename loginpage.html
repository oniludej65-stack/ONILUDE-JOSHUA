<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jayphix</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cabinet Grotesk', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Login Card Container */
        .login-card {
            background-color: #111111;
            border: 1px solid #1a1a1a;
            padding: 45px 40px;
            border-radius: 4px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        /* Branding */
        .brand-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 35px;
        }
        
        .brand-title span {
            color: #f46b09; /* Gold accent dot */
        }

        /* Input Layouts */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: #888888;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background-color: #161616;
            border: 1px solid #252525;
            border-radius: 2px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        /* Focus State */
        .form-group input:focus {
            outline: none;
            border-color: #f46b09;
            background-color: #1a1a1a;
        }

        /* Password Wrapper for Toggle Button */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 45px; /* Leave space for the toggle button */
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: #666666;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            user-select: none;
            transition: color 0.2s ease;
        }

        .toggle-password:hover {
            color: #f46b09;
        }

        /* Utilities: Forgot Password Link */
        .form-utils {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .forgot-link {
            font-size: 13px;
            color: #888888;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-link:hover {
            color: #f46b09;
        }

        /* Action Button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: transparent;
            border: 1px solid #f46b09;
            color: #f46b09;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #f46b09;
            color: #0a0a0a;
        }

        /* Footer Redirection */
        .form-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #555555;
        }

        .form-footer a {
            color: #f46b09;
            text-decoration: none;
            margin-left: 5px;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">Jayphix<span>.</span></div>
        
        <form id="loginForm" action="#" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="alex@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                    <button type="button" id="togglePassword" class="toggle-password">Show</button>
                </div>
            </div>

            <div class="form-utils">
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <div class="form-footer">
            New to Jayphix? <a href="registration.html">Create an account</a>
        </div>
    </div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault(); 

    const inputEmail = document.getElementById('email').value;
    const inputPassword = document.getElementById('password').value;

    const savedEmail = localStorage.getItem('registeredEmail');
    const savedPassword = localStorage.getItem('registeredPassword');

    if (inputEmail === savedEmail && inputPassword === savedPassword) {
        // Create a temporary "Logged In" key in the browser memory
        localStorage.setItem('isLoggedIn', 'true');
        
        alert('Login successful! Directing to your secure dashboard.');
        window.location.href = 'user.html'; 
    } else {
        alert('Error: Invalid email or password.');
    }
});
</script>

</body>
</html>
